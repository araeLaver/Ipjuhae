name: Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    name: Auto Merge auto/* PRs
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'check_suite' &&
      github.event.check_suite.conclusion == 'success' &&
      startsWith(github.event.check_suite.head_branch, 'auto/')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Find PR for this branch
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.check_suite.head_branch }}"
          PR_URL=$(gh pr list --repo "${{ github.repository }}" --head "$BRANCH" --state open --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            echo "No open PR found for branch $BRANCH"
            exit 0
          fi
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.find-pr.outputs.pr_url
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ steps.find-pr.outputs.pr_url }}"

  # Handle PR label-based auto-merge
  auto-merge-labeled:
    name: Auto Merge labeled PRs
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'auto/')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
