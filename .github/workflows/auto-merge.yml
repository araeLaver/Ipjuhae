name: Auto Merge

on:
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    name: Auto Merge auto/* PRs
    runs-on: ubuntu-latest
    if: >-
      github.event.check_suite.conclusion == 'success' &&
      startsWith(github.event.check_suite.head_branch, 'auto/')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Find PR for this branch
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.check_suite.head_branch }}"
          PR_URL=$(gh pr list --repo "${{ github.repository }}" --head "$BRANCH" --state open --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            echo "No open PR found for branch $BRANCH"
            exit 0
          fi
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Squash merge PR
        if: steps.find-pr.outputs.pr_url
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: gh pr merge --squash "${{ steps.find-pr.outputs.pr_url }}"
