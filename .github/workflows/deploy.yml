name: Deploy — Koyeb

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: false
        default: 'production'

concurrency:
  group: deploy-production
  cancel-in-progress: false  # 배포는 취소하지 않음

jobs:
  deploy:
    name: Deploy to Koyeb
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Koyeb CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | bash
          echo "$HOME/.koyeb/bin" >> $GITHUB_PATH

      - name: Deploy to Koyeb
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
        run: |
          if [ -z "$KOYEB_TOKEN" ]; then
            echo "⚠️  KOYEB_TOKEN not set — skipping deploy"
            exit 0
          fi
          koyeb services redeploy crude-zorina/ipjuhae
          echo "Redeploy triggered successfully"

      - name: Verify deployment
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          echo "Waiting 90s for Koyeb deployment..."
          sleep 90
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/api/health")
            echo "Health check attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Deployment verified — $APP_URL is healthy"
              exit 0
            fi
            sleep 30
          done
          echo "Health check failed after 3 attempts — check Koyeb dashboard"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed. Check GitHub Actions logs."
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d '{"text":"Rentme deploy failed. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          fi
