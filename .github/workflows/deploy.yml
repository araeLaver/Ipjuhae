name: Deploy — Koyeb

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy target
        required: false
        default: production

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Koyeb
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Koyeb CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN"             https://api.github.com/repos/koyeb/koyeb-cli/releases/latest             | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "Installing Koyeb CLI $VERSION"
          curl -fsSL "https://github.com/koyeb/koyeb-cli/releases/download/${VERSION}/koyeb-cli_${VERSION#v}_linux_amd64.tar.gz"             -o /tmp/koyeb.tar.gz
          mkdir -p "$HOME/.koyeb/bin"
          tar xzf /tmp/koyeb.tar.gz -C "$HOME/.koyeb/bin" koyeb
          echo "$HOME/.koyeb/bin" >> $GITHUB_PATH

      - name: Deploy to Koyeb
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
        run: |
          if [ -z "$KOYEB_TOKEN" ]; then
            echo "KOYEB_TOKEN not set — skipping deploy"
            exit 0
          fi
          koyeb services redeploy crude-zorina/ipjuhae
          echo "Redeploy triggered successfully"

      - name: Verify deployment
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          echo "Waiting 90s for Koyeb deployment..."
          sleep 90
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/api/health")
            echo "Health check attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Deployment verified"
              exit 0
            fi
            sleep 30
          done
          echo "Health check failed"
          exit 1

      - name: Notify on failure
        if: failure()
        run: echo "Deployment failed. Check GitHub Actions logs."
