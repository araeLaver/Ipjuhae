name: DB Migration

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Choose plan for read-only inspection or apply after reviewing the plan'
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
      confirmation:
        description: 'For apply mode only, type MIGRATE'
        required: false
        type: string
      baseline_confirmation:
        description: 'For apply mode only, type BASELINE_VERIFIED after reviewing the plan'
        required: false
        type: string

permissions:
  contents: read

jobs:
  migrate:
    name: Apply production DB migrations
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    concurrency:
      group: production-database-migration
      cancel-in-progress: false

    steps:
      - name: Verify operator confirmation
        if: ${{ inputs.mode == 'apply' }}
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
          BASELINE_CONFIRMATION: ${{ inputs.baseline_confirmation }}
        run: |
          if [ "$CONFIRMATION" != "MIGRATE" ]; then
            echo "::error::Confirmation must be exactly MIGRATE."
            exit 1
          fi
          if [ "$BASELINE_CONFIRMATION" != "BASELINE_VERIFIED" ]; then
            echo "::error::Baseline confirmation must be exactly BASELINE_VERIFIED."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate migration configuration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_SCHEMA: ipjuhae
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::The production environment is missing DATABASE_URL."
            exit 1
          fi
          if [ "$DB_SCHEMA" != "ipjuhae" ]; then
            echo "::error::Unexpected DB_SCHEMA."
            exit 1
          fi

      - name: Plan pending migrations (read-only)
        run: npm run db:migrate -- --plan
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_SCHEMA: ipjuhae

      - name: Apply the reviewed migration plan
        if: ${{ inputs.mode == 'apply' }}
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_SCHEMA: ipjuhae
