name: Scheduled maintenance

on:
  schedule:
    # Trust outbox delivery: every 5 minutes.
    - cron: '*/5 * * * *'
    # Trust maintenance: every day at 03:00 KST (18:00 UTC).
    - cron: '0 18 * * *'
    # Expire stale references: every day at 03:15 KST (18:15 UTC).
    - cron: '15 18 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'Cron endpoint to invoke'
        required: true
        default: trust-outbox
        type: choice
        options:
          - trust-outbox
          - trust-maintenance
          - references

permissions:
  contents: read

jobs:
  trust-outbox:
    name: Dispatch trust outbox
    if: >-
      github.event.schedule == '*/5 * * * *' ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'trust-outbox')
    runs-on: ubuntu-latest
    timeout-minutes: 4
    concurrency:
      group: cron-trust-outbox
      cancel-in-progress: false
    steps:
      - name: Call trust outbox endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::APP_URL and CRON_SECRET must both be configured."
            exit 1
          fi
          case "$APP_URL" in
            https://*) ;;
            *) echo "::error::APP_URL must use HTTPS."; exit 1 ;;
          esac
          APP_URL="${APP_URL%/}"
          curl --fail-with-body --silent --show-error \
            --connect-timeout 10 --max-time 180 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/trust-outbox"

  trust-maintenance:
    name: Run trust maintenance
    if: >-
      github.event.schedule == '0 18 * * *' ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'trust-maintenance')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: cron-trust-maintenance
      cancel-in-progress: false
    steps:
      - name: Call trust maintenance endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::APP_URL and CRON_SECRET must both be configured."
            exit 1
          fi
          case "$APP_URL" in
            https://*) ;;
            *) echo "::error::APP_URL must use HTTPS."; exit 1 ;;
          esac
          APP_URL="${APP_URL%/}"
          curl --fail-with-body --silent --show-error \
            --connect-timeout 10 --max-time 540 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/trust-maintenance"

  expire-references:
    name: Expire stale references
    if: >-
      github.event.schedule == '15 18 * * *' ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'references')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: cron-references
      cancel-in-progress: false
    steps:
      - name: Call references endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::APP_URL and CRON_SECRET must both be configured."
            exit 1
          fi
          case "$APP_URL" in
            https://*) ;;
            *) echo "::error::APP_URL must use HTTPS."; exit 1 ;;
          esac
          APP_URL="${APP_URL%/}"
          curl --fail-with-body --silent --show-error \
            --connect-timeout 10 --max-time 240 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/references"
