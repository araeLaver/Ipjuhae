name: Fly Secret Sync

on:
  workflow_dispatch:

jobs:
  sync-cron-secret:
    name: Sync CRON_SECRET to Fly
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Sync GitHub CRON_SECRET to Fly
        run: flyctl secrets set CRON_SECRET="$CRON_SECRET" --app ipjuhae-production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
