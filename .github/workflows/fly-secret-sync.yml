name: Fly Secret Sync

on:
  workflow_dispatch:

jobs:
  sync-operational-secrets:
    name: Sync operational secrets to Fly
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Validate required secrets
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DISCLOSURE_SIGNING_KEY: ${{ secrets.DISCLOSURE_SIGNING_KEY }}
        run: |
          test -n "$FLY_API_TOKEN" || { echo "FLY_API_TOKEN is required" >&2; exit 1; }
          test -n "$CRON_SECRET" || { echo "CRON_SECRET is required" >&2; exit 1; }
          test -n "$DISCLOSURE_SIGNING_KEY" || { echo "DISCLOSURE_SIGNING_KEY is required" >&2; exit 1; }
          test "${#CRON_SECRET}" -ge 32 || { echo "CRON_SECRET must be at least 32 characters" >&2; exit 1; }
          test "${#DISCLOSURE_SIGNING_KEY}" -ge 32 || { echo "DISCLOSURE_SIGNING_KEY must be at least 32 characters" >&2; exit 1; }

      - name: Sync GitHub secrets to Fly
        run: >-
          flyctl secrets set
          CRON_SECRET="$CRON_SECRET"
          DISCLOSURE_SIGNING_KEY="$DISCLOSURE_SIGNING_KEY"
          --app ipjuhae-production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DISCLOSURE_SIGNING_KEY: ${{ secrets.DISCLOSURE_SIGNING_KEY }}
