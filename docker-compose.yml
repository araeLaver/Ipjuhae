# Docker Compose v2+ (version field deprecated — omitted)
# Usage: docker compose up -d
# Env:  cp .env.example .env.local && edit .env.local

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: ipjuhae-app:latest
    container_name: ipjuhae-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - ipjuhae-network

  db:
    image: postgres:16-alpine
    container_name: ipjuhae-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ipjuhae}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ipjuhae_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ipjuhae} -d ${POSTGRES_DB:-ipjuhae_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - ipjuhae-network

volumes:
  postgres_data:
    driver: local

networks:
  ipjuhae-network:
    driver: bridge
