version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: rentme-app:latest
    container_name: rentme-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rentme-network

  db:
    image: postgres:16-alpine
    container_name: rentme-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rentme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rentme_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rentme} -d ${POSTGRES_DB:-rentme_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rentme-network

volumes:
  postgres_data:
    driver: local

networks:
  rentme-network:
    driver: bridge
