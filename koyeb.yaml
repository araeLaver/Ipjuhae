# Koyeb deployment configuration for 입주해 (Ipjuhae)
# https://www.koyeb.com/docs/apps/deploying-from-github

name: ipjuhae

services:
  - name: web
    type: web
    git:
      branch: main
    build:
      dockerfile: Dockerfile
      context: .
    ports:
      - port: 3000
        protocol: http
    routes:
      - path: /
        port: 3000
    health_checks:
      - protocol: http
        path: /api/health
        port: 3000
        initial_delay: 15
        period: 30
        timeout: 5
        success_threshold: 1
        failure_threshold: 3
    env:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        value: "https://www.ipjuhae.com"
      - key: NEXT_PUBLIC_BASE_URL
        value: "https://www.ipjuhae.com"
      - key: DB_SCHEMA
        value: ipjuhae
      # DATABASE_URL, JWT_SECRET 등은 Koyeb 대시보드에서 Secret으로 설정
    scaling:
      min: 1
      max: 1
    instance_types:
      - nano
